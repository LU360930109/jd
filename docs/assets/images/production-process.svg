<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8f9fa" rx="8"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">胶带生产工艺流程图</text>
  <text x="300" y="50" text-anchor="middle" font-size="12" fill="#666">Adhesive Tape Production Process Flow</text>
  
  <!-- Process Steps -->
  <!-- Step 1: Raw Material Preparation -->
  <rect x="50" y="80" width="120" height="60" fill="#0066cc" rx="8"/>
  <text x="110" y="105" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">原料准备</text>
  <text x="110" y="120" text-anchor="middle" font-size="10" fill="#e0e0e0">Raw Material</text>
  <text x="110" y="135" text-anchor="middle" font-size="10" fill="#e0e0e0">Preparation</text>
  
  <!-- Arrow 1 -->
  <line x1="170" y1="110" x2="200" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Mixing -->
  <rect x="200" y="80" width="100" height="60" fill="#4caf50" rx="8"/>
  <text x="250" y="105" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">配料混合</text>
  <text x="250" y="120" text-anchor="middle" font-size="10" fill="#e0e0e0">Mixing</text>
  
  <!-- Arrow 2 -->
  <line x1="300" y1="110" x2="330" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Coating -->
  <rect x="330" y="80" width="100" height="60" fill="#ff9800" rx="8"/>
  <text x="380" y="105" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">涂布</text>
  <text x="380" y="120" text-anchor="middle" font-size="10" fill="#e0e0e0">Coating</text>
  
  <!-- Arrow 3 -->
  <line x1="430" y1="110" x2="460" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Drying -->
  <rect x="460" y="80" width="100" height="60" fill="#f44336" rx="8"/>
  <text x="510" y="105" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">干燥</text>
  <text x="510" y="120" text-anchor="middle" font-size="10" fill="#e0e0e0">Drying</text>
  
  <!-- Arrow 4 -->
  <line x1="510" y1="140" x2="510" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: Lamination -->
  <rect x="460" y="170" width="100" height="60" fill="#9c27b0" rx="8"/>
  <text x="510" y="195" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">复合</text>
  <text x="510" y="210" text-anchor="middle" font-size="10" fill="#e0e0e0">Lamination</text>
  
  <!-- Arrow 5 -->
  <line x1="460" y1="200" x2="430" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: Slitting -->
  <rect x="330" y="170" width="100" height="60" fill="#00bcd4" rx="8"/>
  <text x="380" y="195" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">分切</text>
  <text x="380" y="210" text-anchor="middle" font-size="10" fill="#e0e0e0">Slitting</text>
  
  <!-- Arrow 6 -->
  <line x1="330" y1="200" x2="300" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 7: Packaging -->
  <rect x="200" y="170" width="100" height="60" fill="#795548" rx="8"/>
  <text x="250" y="195" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">包装</text>
  <text x="250" y="210" text-anchor="middle" font-size="10" fill="#e0e0e0">Packaging</text>
  
  <!-- Arrow 7 -->
  <line x1="200" y1="200" x2="170" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 8: Quality Control -->
  <rect x="50" y="170" width="120" height="60" fill="#607d8b" rx="8"/>
  <text x="110" y="195" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">质量检测</text>
  <text x="110" y="210" text-anchor="middle" font-size="10" fill="#e0e0e0">Quality Control</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="260" width="15" height="15" fill="#0066cc" rx="2"/>
  <text x="70" y="272" font-size="10" fill="#666">原料准备</text>
  
  <rect x="130" y="260" width="15" height="15" fill="#4caf50" rx="2"/>
  <text x="150" y="272" font-size="10" fill="#666">配料混合</text>
  
  <rect x="210" y="260" width="15" height="15" fill="#ff9800" rx="2"/>
  <text x="230" y="272" font-size="10" fill="#666">涂布</text>
  
  <rect x="270" y="260" width="15" height="15" fill="#f44336" rx="2"/>
  <text x="290" y="272" font-size="10" fill="#666">干燥</text>
  
  <rect x="330" y="260" width="15" height="15" fill="#9c27b0" rx="2"/>
  <text x="350" y="272" font-size="10" fill="#666">复合</text>
  
  <rect x="390" y="260" width="15" height="15" fill="#00bcd4" rx="2"/>
  <text x="410" y="272" font-size="10" fill="#666">分切</text>
  
  <rect x="450" y="260" width="15" height="15" fill="#795548" rx="2"/>
  <text x="470" y="272" font-size="10" fill="#666">包装</text>
  
  <rect x="510" y="260" width="15" height="15" fill="#607d8b" rx="2"/>
  <text x="530" y="272" font-size="10" fill="#666">质量检测</text>
  
  <!-- Notes -->
  <text x="300" y="300" text-anchor="middle" font-size="10" fill="#999">注：实际生产流程可能因产品类型不同而有所差异</text>
  
  <!-- Flow direction -->
  <text x="300" y="330" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">工艺流程方向：从左到右，从上到下</text>
</svg>