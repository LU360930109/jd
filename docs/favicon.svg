<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tapeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004499;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tape roll -->
  <circle cx="50" cy="50" r="45" fill="url(#tapeGradient)" stroke="#003366" stroke-width="2"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="20" fill="#ffffff" stroke="#003366" stroke-width="2"/>
  
  <!-- Tape strip -->
  <path d="M 50 5 L 95 50 L 50 95 L 5 50 Z" fill="none" stroke="#003366" stroke-width="3" stroke-dasharray="10,5"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#003366"/>
  
  <!-- Text -->
  <text x="50" y="55" font-family="Arial, sans-serif" font-size="12" fill="#003366" text-anchor="middle" font-weight="bold">JD</text>
</svg>