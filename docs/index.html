    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .language-selection {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--background-color) 100%);
            padding: 2rem;
        }
        
        .language-card {
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 3rem;
            text-align: center;
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
        }
        
        .language-card h1 {
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        
        .language-card .subtitle {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .language-options {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .language-option {
            display: block;
            padding: 2rem;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        
        .language-option:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-light);
            text-decoration: none;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .language-option h3 {
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            font-size: 1.5rem;
        }
        
        .language-option p {
            margin-bottom: 0;
            font-size: 0.95rem;
            color: var(--text-light);
        }
        
        .features {
            margin-top: 3rem;
            text-align: left;
        }
        
        .features h3 {
            margin-bottom: 1rem;
            color: var(--text-color);
            font-size: 1.1rem;
        }
        
        .feature-list {
            list-style: none;
            padding: 0;
        }
        
        .feature-list li {
            padding: 0.5rem 0;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .feature-list li:before {
            content: "✓";
            color: var(--success-color);
            margin-right: 0.5rem;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .language-card {
                padding: 2rem;
            }
            
            .language-card h1 {
                font-size: 1.5rem;
            }
            
            .language-option {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="language-selection">
        <div class="language-card">
            <h1>胶带行业知识树</h1>

            <div class="language-options">
                <a href="zh/" class="language-option">
                    <h3>中文</h3>
                    <p>系统化的胶带行业知识体系，包含100+个知识叶片</p>
                </a>
                
                <a href="en/" class="language-option">
                    <h3>English</h3>
                    <p>Comprehensive adhesive tape industry knowledge system with 100+ knowledge points</p>
                </a>
            </div>
            
            <div class="features">
                <h3>网站特点</h3>
                <ul class="feature-list">
                    <li>100+个专业知识叶片</li>
                    <li>4大板块：基础科学、生产工艺、应用领域、行业管理</li>
                    <li>中英文双语支持</li>
                    <li>面包屑导航和相关知识推荐</li>
                    <li>全站搜索功能</li>
                    <li>SEO和GEO优化</li>
                </ul>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="assets/js/lang-switch.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>

                // Optional: auto-redirect to saved language
                // window.location.href = savedLang + '/';
            }
        });
    </script>
</body>
